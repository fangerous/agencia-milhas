<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Agencia de Milhas</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#0a0a1a;color:white;padding:8px;padding-bottom:70px}
        h1{color:#00b4d8;text-align:center;font-size:18px;margin:10px 0}
        .card{background:#0f3460;padding:12px;border-radius:12px;margin:6px 0}
        h2{color:#00b4d8;font-size:14px;margin-bottom:8px}
        .tabs{display:flex;gap:4px;margin:8px 0;position:sticky;top:0;z-index:10;background:#0a0a1a;padding:5px 0}
        .tab{flex:1;padding:10px;background:#16213e;border-radius:10px;text-align:center;font-size:12px;font-weight:bold;cursor:pointer;border:none;color:white}
        .tab.active{background:#00b4d8;color:#0a0a1a}
        .rota{background:#16213e;padding:10px;border-radius:10px;margin:5px 0;border-left:4px solid #00b4d8}
        .r-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
        .r-nome{color:#00b4d8;font-weight:bold;font-size:13px}
        .r-preco{color:#00ff88;font-weight:bold;font-size:15px}
        .r-info{color:#aaa;font-size:10px;margin:3px 0}
        .r-progs{display:flex;flex-wrap:wrap;gap:2px;margin:3px 0}
        .r-prog{background:#0f3460;color:#ffaa00;padding:2px 6px;border-radius:6px;font-size:8px}
        button{background:#00b4d8;color:white;padding:6px 12px;border:none;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px 2px}
        .btn-whats{background:#25D366;color:white;display:block;width:100%;padding:14px;border:none;border-radius:25px;font-size:16px;font-weight:bold;cursor:pointer;margin:8px 0}
        .btn-rem{background:#ff6b35;color:white;padding:4px 8px;border:none;border-radius:4px;font-size:10px;cursor:pointer}
        input[type=text]{width:100%;padding:10px;margin:4px 0;background:#1a1a2e;color:white;border:2px solid #333;border-radius:8px;font-size:14px}
        input[type=range]{width:100%;margin:8px 0}
        .lucro{color:#00ff88;font-size:22px;font-weight:bold;text-align:center;margin:5px 0}
        .progs{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
        .prog-item{display:inline-block}
        .prog-item input{display:none}
        .prog-item label{display:inline-block;background:#16213e;padding:5px 8px;border-radius:10px;font-size:9px;cursor:pointer;border:2px solid transparent}
        .prog-item input:checked+label{border-color:#00ff88;background:#1a2744;color:#00ff88}
        .prop-item{background:#16213e;padding:8px;border-radius:8px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;font-size:11px}
        .total{color:#00ff88;font-size:18px;font-weight:bold;text-align:right;margin:8px 0}
        .hidden{display:none}
        .info{color:#aaa;font-size:10px;text-align:center;margin:5px 0}
    </style>
</head>
<body>

<h1>✈️ Agencia de Milhas</h1>

<div class="tabs">
    <button class="tab active" id="tab-rotas" onclick="mostrarAba('rotas')">🌍 Rotas</button>
    <button class="tab" id="tab-busca" onclick="mostrarAba('busca')">🔍 Buscar</button>
    <button class="tab" id="tab-proposta" onclick="mostrarAba('proposta')">📄 Proposta</button>
</div>

<div id="aba-rotas">
    <div class="card">
        <h2>💰 Margem de Lucro</h2>
        <input type="range" id="margem" min="10" max="50" value="30" oninput="atualizarMargem()">
        <div class="lucro" id="margem-valor">30%</div>
        <h2>🎯 Programas (selecione os que deseja comparar)</h2>
        <div class="progs" id="progs-checkboxes"></div>
        <button style="width:100%;margin-top:5px" onclick="aplicarFiltros()">✅ Aplicar Filtros</button>
    </div>
    <div id="rotas-container"><p style="text-align:center;color:#aaa;padding:20px">Carregando rotas...</p></div>
</div>

<div id="aba-busca" class="hidden">
    <div class="card">
        <h2>🔍 Buscar Rota Especifica</h2>
        <input type="text" id="busca-origem" placeholder="Origem (ex: GRU)" maxlength="3" autocomplete="off">
        <input type="text" id="busca-destino" placeholder="Destino (ex: MIA)" maxlength="3" autocomplete="off">
        <button style="width:100%" onclick="buscarRota()">🔍 Buscar</button>
        <div id="busca-resultado" style="margin-top:10px"></div>
    </div>
</div>

<div id="aba-proposta" class="hidden">
    <div class="card">
        <h2>📄 Proposta para Cliente</h2>
        <input type="text" id="cliente-nome" placeholder="Nome do cliente">
    </div>
    <div id="proposta-container"><p style="text-align:center;color:#aaa;padding:20px">Nenhuma rota na proposta</p></div>
    <div class="total hidden" id="proposta-total"></div>
    <button class="btn-whats hidden" id="btn-whatsapp" onclick="enviarWhatsApp()">💬 Enviar Proposta via WhatsApp</button>
</div>

<script>
(function(){
    var VALORES = {"Amex MR":0.018,"Chase UR":0.02,"Capital One":0.017,"Citi TYP":0.016,"Bilt":0.018,"Marriott":0.008,"United":0.013,"Delta":0.012,"American":0.014,"TAP":0.015,"LATAM":0.011,"Azul":0.01};
    var COMPANHIAS = ["United","Delta","American","TAP","LATAM","Azul","British Airways","Air France","Lufthansa","Emirates"];
    var rotas = [];
    var proposta = [];
    var programasSelecionados = ["United","Delta","American"];
    
    function gerarRotas(){
        rotas = [];
        var origens = ["GRU","GIG","BSB","CNF","SSA","REC"];
        var destinos = ["MIA","MCO","JFK","LHR","CDG","MAD","LIS","FCO","DXB","HND","EZE","SCL"];
        for(var i=0;i<origens.length;i++){
            for(var j=0;j<destinos.length;j++){
                rotas.push({
                    origem: origens[i],
                    destino: destinos[j],
                    milhas: Math.floor(Math.random()*50000)+15000,
                    taxas: Math.floor(Math.random()*550)+150,
                    companhia: COMPANHIAS[Math.floor(Math.random()*COMPANHIAS.length)]
                });
            }
        }
    }
    
    function renderProgramas(){
        var h = '';
        for(var p in VALORES){
            var c = programasSelecionados.indexOf(p) >= 0 ? 'checked' : '';
            h += '<span class="prog-item"><input type="checkbox" id="p_'+p+'" '+c+' onchange="window.togglePrograma(''+p+'')"><label for="p_'+p+'">'+p+'</label></span>';
        }
        document.getElementById('progs-checkboxes').innerHTML = h;
    }
    
    window.togglePrograma = function(p){
        var i = programasSelecionados.indexOf(p);
        if(i >= 0) programasSelecionados.splice(i,1);
        else programasSelecionados.push(p);
    };
    
    function melhorValor(){
        var mv = 0;
        for(var i=0;i<programasSelecionados.length;i++){
            var v = VALORES[programasSelecionados[i]] || 0;
            if(v > mv) mv = v;
        }
        return mv || 0.014;
    }
    
    window.atualizarMargem = function(){
        document.getElementById('margem-valor').textContent = document.getElementById('margem').value + '%';
        renderRotas();
    };
    
    window.aplicarFiltros = function(){
        renderRotas();
    };
    
    function renderRotas(){
        var m = parseInt(document.getElementById('margem').value);
        var mv = melhorValor();
        var h = '<p style="color:#aaa;font-size:11px;margin:8px 0">'+rotas.length+' rotas | Melhor programa: R$ '+mv.toFixed(3)+'/ponto | Margem: '+m+'%</p>';
        
        for(var i=0;i<rotas.length;i++){
            var r = rotas[i];
            var venda = Math.floor(r.milhas * mv * (1 + m/100));
            var custo = Math.floor(r.milhas * mv);
            
            var ph = '';
            for(var j=0;j<programasSelecionados.length;j++){
                var p = programasSelecionados[j];
                if(VALORES[p]){
                    var pv = Math.floor(r.milhas * VALORES[p] * (1 + m/100));
                    ph += '<span class="r-prog">'+p+': R$'+pv.toLocaleString('pt-BR')+'</span>';
                }
            }
            
            h += '<div class="rota">'+
                '<div class="r-top"><span class="r-nome">'+r.origem+' → '+r.destino+'</span><span class="r-preco">R$ '+venda.toLocaleString('pt-BR')+'</span></div>'+
                '<div class="r-info">'+r.milhas.toLocaleString('pt-BR')+' milhas + R$ '+r.taxas+' | ✈️ '+r.companhia+' | Custo: R$ '+custo.toLocaleString('pt-BR')+'</div>'+
                '<div class="r-progs">'+ph+'</div>'+
                '<button onclick="window.addProposta(''+r.origem+'',''+r.destino+'','+r.milhas+','+r.taxas+',''+r.companhia+'','+venda+')">➕ Adicionar a Proposta</button>'+
            '</div>';
        }
        
        document.getElementById('rotas-container').innerHTML = h;
    }
    
    window.buscarRota = function(){
        var o = document.getElementById('busca-origem').value.toUpperCase().trim();
        var d = document.getElementById('busca-destino').value.toUpperCase().trim();
        var res = document.getElementById('busca-resultado');
        var m = parseInt(document.getElementById('margem').value);
        var mv = melhorValor();
        
        if(!o){res.innerHTML='<p style="color:#ff6b35;text-align:center">Digite a origem</p>';return;}
        
        var enc = rotas.filter(function(r){return r.origem===o && (!d||r.destino===d);});
        
        if(enc.length===0){res.innerHTML='<p style="color:#ff6b35;text-align:center">❌ Rota nao encontrada</p>';return;}
        
        var h = '<p style="color:#aaa;font-size:11px">'+enc.length+' rota(s) encontrada(s)</p>';
        for(var i=0;i<enc.length;i++){
            var r = enc[i];
            var vd = Math.floor(r.milhas*mv*(1+m/100));
            h += '<div class="rota"><div class="r-top"><span class="r-nome">✅ '+r.origem+' → '+r.destino+'</span><span class="r-preco">R$ '+vd.toLocaleString('pt-BR')+'</span></div><div class="r-info">'+r.milhas.toLocaleString('pt-BR')+' milhas + R$ '+r.taxas+' | ✈️ '+r.companhia+'</div><button onclick="window.addProposta(''+r.origem+'',''+r.destino+'','+r.milhas+','+r.taxas+',''+r.companhia+'','+vd+')">➕ Proposta</button></div>';
        }
        res.innerHTML = h;
    };
    
    window.addProposta = function(o,d,m,t,c,v){
        if(proposta.length >= 5){alert('⚠️ Maximo 5 rotas por proposta!');return;}
        proposta.push({origem:o,destino:d,milhas:m,taxas:t,companhia:c,venda:v});
        renderProposta();
        mostrarAba('proposta');
    };
    
    function renderProposta(){
        var h = '';
        var total = 0;
        for(var i=0;i<proposta.length;i++){
            var r = proposta[i];
            total += r.venda;
            h += '<div class="prop-item"><div><b style="color:#00b4d8">'+r.origem+' → '+r.destino+'</b><span style="color:#aaa;font-size:9px"> | '+r.companhia+' | '+r.milhas.toLocaleString('pt-BR')+' milhas</span></div><div style="display:flex;align-items:center;gap:6px"><span style="color:#00ff88;font-weight:bold">R$ '+r.venda.toLocaleString('pt-BR')+'</span><button class="btn-rem" onclick="window.removerProposta('+i+')">✕</button></div></div>';
        }
        
        document.getElementById('proposta-container').innerHTML = h || '<p style="text-align:center;color:#aaa;padding:20px">Nenhuma rota na proposta</p>';
        
        if(proposta.length > 0){
            document.getElementById('proposta-total').textContent = '💎 Total: R$ '+total.toLocaleString('pt-BR');
            document.getElementById('proposta-total').classList.remove('hidden');
            document.getElementById('btn-whatsapp').classList.remove('hidden');
        }else{
            document.getElementById('proposta-total').classList.add('hidden');
            document.getElementById('btn-whatsapp').classList.add('hidden');
        }
    }
    
    window.removerProposta = function(i){
        proposta.splice(i,1);
        renderProposta();
    };
    
    window.enviarWhatsApp = function(){
        if(proposta.length===0){alert('Adicione rotas!');return;}
        var n = document.getElementById('cliente-nome').value||'Cliente';
        var msg = '*PROPOSTA DE VIAGEM - Agencia de Milhas*%0A%0A👤 Cliente: '+n+'%0A📅 Data: '+new Date().toLocaleDateString('pt-BR')+'%0A%0A✈️ *ROTAS COTADAS:*%0A%0A';
        var t=0;
        for(var i=0;i<proposta.length;i++){
            var r=proposta[i];t+=r.venda;
            msg+=(i+1)+'. *'+r.origem+' → '+r.destino+'*%0A   🛫 '+r.companhia+'%0A   💰 '+r.milhas.toLocaleString('pt-BR')+' milhas + R$ '+r.taxas+'%0A   💵 *R$ '+r.venda.toLocaleString('pt-BR')+'*%0A%0A';
        }
        msg+='💎 *VALOR TOTAL: R$ '+t.toLocaleString('pt-BR')+'*%0A%0A📞 Entre em contato para confirmar a reserva!';
        window.open('https://wa.me/5511999999999?text='+msg,'_blank');
    };
    
    function mostrarAba(aba){
        document.getElementById('aba-rotas').classList.add('hidden');
        document.getElementById('aba-busca').classList.add('hidden');
        document.getElementById('aba-proposta').classList.add('hidden');
        document.getElementById('aba-'+aba).classList.remove('hidden');
        
        document.getElementById('tab-rotas').classList.remove('active');
        document.getElementById('tab-busca').classList.remove('active');
        document.getElementById('tab-proposta').classList.remove('active');
        document.getElementById('tab-'+aba).classList.add('active');
    }
    
    window.mostrarAba = mostrarAba;
    
    // Inicializar
    gerarRotas();
    renderProgramas();
    renderRotas();
    
})();
</script>

</body>
</html>
